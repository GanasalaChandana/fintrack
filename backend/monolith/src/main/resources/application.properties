# =====================
# Server
# =====================
server.port=8080
spring.application.name=fintrack-monolith

# =====================
# Database (use env vars on Render)
# =====================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Flyway
# =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =====================
# Google OAuth
# =====================
google.client.id=${GOOGLE_CLIENT_ID}

# =====================
# Redis (optional — comment out if not using)
# =====================
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=2000ms

# =====================
# Mail (optional — comment out if not using)
# =====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# Kafka (optional — comment out if not using)
# =====================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=fintrack-group
spring.kafka.consumer.auto-offset-reset=earliest

# =====================
# Actuator / Health
# =====================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# =====================
# Jackson
# =====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC